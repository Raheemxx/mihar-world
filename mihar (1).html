    .bg.loaded { transform: scale(1); }

    .vignette {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 50% 40%, transparent 30%, rgba(8,8,8,0.55) 70%, rgba(8,8,8,0.92) 100%),
        linear-gradient(to top, rgba(8,8,8,0.97) 0%, transparent 38%),
        linear-gradient(to bottom, rgba(8,8,8,0.6) 0%, transparent 20%);
      pointer-events: none;
    }

    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: clamp(32px, 6vh, 64px);
    }

    .bottom {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      animation: fadeUp 1.2s cubic-bezier(.22,1,.36,1) both;
    }

    .title-wrap { text-align: center; line-height: 1; }
    .title-wrap .artist {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 12vw, 110px);
      letter-spacing: 0.12em;
      color: var(--white);
      text-shadow: 0 0 40px rgba(192,24,28,0.5), 0 2px 0 rgba(0,0,0,0.8);
      display: block;
    }
    .title-wrap .tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 4.5vw, 40px);
      letter-spacing: 0.3em;
      color: var(--red);
      text-transform: uppercase;
      display: block;
      margin-top: -4px;
    }

    .divider { width: 80px; height: 2px; background: linear-gradient(to right, transparent, var(--red), transparent); }

    .links { display: flex; gap: clamp(28px, 5vw, 52px); align-items: center; }

    .link {
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      text-decoration: none;
      color: var(--grey);
      transition: color 0.25s, transform 0.25s;
    }
    .link:hover { color: var(--white); transform: translateY(-4px); }
    .link:hover .icon-ring { border-color: var(--red); box-shadow: 0 0 18px rgba(192,24,28,0.45); }
    .link:hover svg { fill: var(--white); }

    .icon-ring {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 1.5px solid rgba(176,168,160,0.35);
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,8,8,0.55);
      backdrop-filter: blur(6px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .link svg { width: 22px; height: 22px; fill: var(--grey); transition: fill 0.25s; }

    .link-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.7; }

    .advisory { font-size: 9px; letter-spacing: 0.18em; color: rgba(176,168,160,0.35); text-transform: uppercase; margin-top: 6px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .icon-ring { width: 46px; height: 46px; }
      .link svg  { width: 19px; height: 19px; }
      .links     { gap: 22px; }
    }
  </style>
</head>

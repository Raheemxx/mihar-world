<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mihar World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--scarlet:#ff2400;}
body{margin:0;background:black;color:white;font-family:Arial;overflow:hidden;}
canvas{position:fixed;top:0;left:0;}
.hero{position:relative;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
img{width:420px;filter:drop-shadow(0 0 20px var(--scarlet));}
.title{font-size:60px;}
.title span{color:var(--scarlet);}
.enter,.secret{margin-top:15px;padding:12px 30px;border:1px solid var(--scarlet);color:var(--scarlet);text-decoration:none;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hero">
<img src="assets/hero.png">
<div class="title">MIHAR <span>WORLD</span></div>
<a class="enter" href="polymath.html">ENTER</a>
<a class="secret" href="vault.html">VAULT</a>
</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b7b3a4e4.mp3">
</audio>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<100;i++){p.push({x:Math.random()*c.width,y:Math.random()*c.height});}

onmousemove=e=>{
p.forEach(pt=>{
pt.x+=(e.clientX-pt.x)*0.01;
pt.y+=(e.clientY-pt.y)*0.01;
});
};

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#ff2400";
p.forEach(pt=>ctx.fillRect(pt.x,pt.y,2,2));
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

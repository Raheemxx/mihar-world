    .vignette {

      color: var(--white);
      text-shadow: 0 0 40px rgba(192,24,28,0.5), 0 2px 0 rgba(0,0,0,0.8);
      display: block;
    }
    .title-wrap .tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 4.5vw, 40px);
      letter-spacing: 0.3em;
      color: var(--red);
      text-transform: uppercase;
      display: block;
      margin-top: -4px;
    }

    .divider { width: 80px; height: 2px; background: linear-gradient(to right, transparent, var(--red), transparent); }

    .links { display: flex; gap: clamp(28px, 5vw, 52px); align-items: center; }

    .link {
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      text-decoration: none;
      color: var(--grey);
      transition: color 0.25s, transform 0.25s;
    }
    .link:hover { color: var(--white); transform: translateY(-4px); }
    .link:hover .icon-ring { border-color: var(--red); box-shadow: 0 0 18px rgba(192,24,28,0.45); }
    .link:hover svg { fill: var(--white); }

    .icon-ring {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 1.5px solid rgba(176,168,160,0.35);
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,8,8,0.55);
      backdrop-filter: blur(6px);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .link svg { width: 22px; height: 22px; fill: var(--grey); transition: fill 0.25s; }

    .link-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.7; }

    .advisory { font-size: 9px; letter-spacing: 0.18em; color: rgba(176,168,160,0.35); text-transform: uppercase; margin-top: 6px; }

    /* ── WATCH NOW ── */
    .watch-btn {
      position: fixed;
      top: clamp(24px, 5vh, 48px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      animation: fadeDown 1.4s cubic-bezier(.22,1,.36,1) both;
    }
    .watch-btn a {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      padding: 11px 26px 11px 20px;
      border: 1px solid rgba(240,236,230,0.2);
      border-radius: 40px;
      background: rgba(8,8,8,0.45);
      backdrop-filter: blur(10px);
      color: var(--white);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(13px, 2vw, 16px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .watch-btn a:hover {
      background: rgba(192,24,28,0.18);
      border-color: var(--red);
      box-shadow: 0 0 24px rgba(192,24,28,0.35);
      transform: scale(1.04);
    }
    .watch-btn .play-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.25s;
    }
    .watch-btn a:hover .play-icon { background: #e01f24; }
    .watch-btn .play-icon svg { width: 11px; height: 11px; fill: var(--white); margin-left: 2px; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .icon-ring { width: 46px; height: 46px; }
      .link svg  { width: 19px; height: 19px; }
      .links     { gap: 22px; }
    }
  </style>
</head>
